<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Blog</title>
    <meta name="description" content="A minimal editorial blog built with FastAPI and React." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph (Facebook, iMessage, Slack, Discord, etc.) -->
    <meta property="og:url" content="https://claude-blog-frontend.onrender.com" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Claude Blog" />
    <meta property="og:description" content="A minimal editorial blog built with FastAPI and React." />
    <meta property="og:image" content="https://claude-blog-frontend.onrender.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Claude Blog" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Claude Blog" />
    <meta name="twitter:description" content="A minimal editorial blog built with FastAPI and React." />
    <meta name="twitter:image" content="https://claude-blog-frontend.onrender.com/og-image.png" />

    <!-- Theme color for browser chrome -->
    <meta name="theme-color" content="#1A1A1A" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAFAF8" media="(prefers-color-scheme: light)" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
